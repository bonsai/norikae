    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

            <div style={{ fontSize: '32px', marginBottom: '8px' }}>🎯</div>
            <h2 style={{ fontSize: '24px', fontWeight: 900, color: '#1f2937', margin: 0 }}>レベルをえらぼう！</h2>
            <p style={{ fontSize: '14px', color: '#6b7280', marginTop: '4px' }}>すきなレベルをタップしてね</p>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '16px', flex: 1, justifyContent: 'center' }}>
            {modes.map((m, i) => (
              <motion.button
                key={m.key}
                onClick={() => onSelect(m.key)}
                style={{
                  display: 'flex', alignItems: 'center', gap: '16px',
                  padding: '20px', borderRadius: '24px', border: 'none', cursor: 'pointer',
                  background: `linear-gradient(135deg, ${m.color}dd, ${m.color}99)`,
                  color: '#fff', fontFamily: 'inherit',
                  boxShadow: `0 4px 12px ${m.color}44`,
                }}
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ delay: i * 0.1 }}
                whileHover={{ scale: 1.03, x: 4 }}
                whileTap={{ scale: 0.97 }}
              >
                <span style={{ fontSize: '40px' }}>{m.emoji}</span>
                <div style={{ textAlign: 'left', flex: 1 }}>
                  <div style={{ fontSize: '20px', fontWeight: 900 }}>{m.label}</div>
                  <div style={{ fontSize: '14px', opacity: 0.8 }}>{m.desc}</div>
                </div>
                <span style={{ fontSize: '24px' }}>→</span>
              </motion.button>
            ))}
          </div>
        </motion.div>
      );
    }

    // ─── 選択肢ボタン ──────────────────────────────────────────
    function ChoiceButton({ label, text, color, state, onClick, disabled }) {
      const bgMap = {
        idle:    `${color}22`,
        correct: color,
        wrong:   '#ef444422',
        dim:     '#f3f4f6',
      };
      const borderMap = {
        idle:    `2px solid ${color}66`,
        correct: `2px solid ${color}`,
        wrong:   '2px solid #ef444466',
        dim:     '2px solid #e5e7eb',
      };
      const textMap = {
        idle:    '#1a1a2e',
        correct: '#ffffff',
        wrong:   '#9ca3af',
        dim:     '#9ca3af',
      };

      return (
        <motion.button
          onClick={onClick}
          disabled={disabled}
          style={{
            display: 'flex', alignItems: 'center', gap: '12px',
            width: '100%', padding: '14px 16px', borderRadius: '16px',
            textAlign: 'left', cursor: disabled ? 'default' : 'pointer',
            background: bgMap[state],
            border: borderMap[state],
            color: textMap[state],
            fontFamily: 'inherit',
          }}
          whileHover={!disabled ? { scale: 1.02 } : {}}
          whileTap={!disabled ? { scale: 0.98 } : {}}
          animate={state === 'correct' ? { scale: [1, 1.04, 1] } : {}}
          transition={{ duration: 0.3 }}
        >
          <span
            style={{
              flexShrink: 0, width: '36px', height: '36px', borderRadius: '50%',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontWeight: 900, fontSize: '14px',
              background: state === 'correct' ? 'rgba(255,255,255,0.3)' : `${color}33`,
              color: state === 'correct' ? '#fff' : color,
            }}
          >
            {state === 'correct' ? '✓' : state === 'wrong' ? '✗' : label}
          </span>
          <span style={{ fontWeight: 700, fontSize: '14px', lineHeight: 1.4 }}>{text}</span>
        </motion.button>
      );
    }

    // ─── クイズプレイ画面 ──────────────────────────────────────
    function PlayScreen({ questions, onFinish }) {
      const [idx, setIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [answerState, setAnswerState] = useState('idle');
      const [selectedIdx, setSelectedIdx] = useState(null);
      const [showExplanation, setShowExplanation] = useState(false);
      const scoreRef = useRef(0);

      const q = questions[idx];
      const diffInfo = DIFFICULTY_LABELS[q.difficulty];
      const c1 = q.lineColor;
      const c2 = q.lineColor2 || q.lineColor;

      const handleAnswer = useCallback((choiceIdx) => {
        if (answerState !== 'idle') return;
        setSelectedIdx(choiceIdx);
        if (choiceIdx === q.correctIndex) {
          setAnswerState('correct');
          scoreRef.current = scoreRef.current + 1;
          setScore(s => s + 1);
        } else {
          setAnswerState('wrong');
        }
        setShowExplanation(true);
      }, [answerState, q.correctIndex]);

      const handleNext = useCallback(() => {
        if (idx + 1 >= questions.length) {
          onFinish(scoreRef.current, questions.length);
        } else {
          setIdx(i => i + 1);
          setAnswerState('idle');
          setSelectedIdx(null);
          setShowExplanation(false);
        }
      }, [idx, questions.length, onFinish]);

      const progress = (idx / questions.length) * 100;
      const progressAfter = ((idx + 1) / questions.length) * 100;

      return (
        <motion.div
          key={idx}
          style={{ display: 'flex', flexDirection: 'column', height: '100%' }}
          initial={{ opacity: 0, x: 30 }}
          animate={{ opacity: 1, x: 0 }}
          exit={{ opacity: 0, x: -30 }}
          transition={{ duration: 0.3 }}
        >
          {/* ヘッダー */}
          <div style={{ padding: '20px 20px 16px', borderRadius: '0 0 24px 24px', background: `linear-gradient(135deg, ${c1}, ${c2})`, flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
              <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                <LineBadge name={q.lineName} color="rgba(255,255,255,0.3)" />
                {q.lineName2 && <LineBadge name={q.lineName2} color="rgba(255,255,255,0.3)" />}
              </div>
              <span style={{ color: '#fff', fontWeight: 900, fontSize: '14px', opacity: 0.9 }}>
                {idx + 1} / {questions.length}
              </span>
            </div>

            {/* プログレスバー */}
            <div style={{ width: '100%', height: '8px', borderRadius: '9999px', background: 'rgba(255,255,255,0.3)', overflow: 'hidden' }}>
              <motion.div
                style={{ height: '100%', borderRadius: '9999px', background: '#fff' }}
                initial={{ width: `${progress}%` }}
                animate={{ width: `${progressAfter}%` }}
                transition={{ duration: 0.4 }}
              />
            </div>

            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '8px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                <Stars count={q.difficulty === 'easy' ? 1 : q.difficulty === 'normal' ? 2 : 3} />
                <span style={{ color: 'rgba(255,255,255,0.8)', fontSize: '12px' }}>{diffInfo.label}</span>
              </div>
              <span style={{ color: '#fff', fontWeight: 900, fontSize: '14px' }}>スコア: {score}</span>
            </div>
          </div>

          {/* 問題文 */}
          <div style={{ padding: '16px 20px', flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: '12px' }}>
              <span style={{ fontSize: '32px', flexShrink: 0 }}>{q.emoji}</span>
              <p style={{ fontWeight: 900, color: '#1f2937', lineHeight: 1.5, fontSize: '17px', whiteSpace: 'pre-line', margin: 0 }}>
                {q.question}
              </p>
            </div>
            {q.hint && answerState === 'idle' && (
              <motion.div
                style={{ marginTop: '8px', padding: '6px 12px', borderRadius: '12px', fontSize: '12px', fontWeight: 700, color: '#6b7280', background: '#f3f4f6' }}
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                transition={{ delay: 1.5 }}
              >
                💡 ヒント: {q.hint}
              </motion.div>
            )}
          </div>

          {/* 選択肢 */}
          <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: '10px', flex: 1 }}>
            {q.choices.map((choice, i) => {
              let state = 'idle';
              if (answerState !== 'idle') {
                if (i === q.correctIndex) state = 'correct';
                else if (i === selectedIdx) state = 'wrong';
                else state = 'dim';
              }
              return (
                <ChoiceButton
                  key={i}
                  label={CHOICE_LABELS[i]}
                  text={choice}
                  color={CHOICE_COLORS[i]}
                  state={state}
                  onClick={() => handleAnswer(i)}
                  disabled={answerState !== 'idle'}
                />
              );
            })}
          </div>

          {/* 解説・次へ */}
          <AnimatePresence>
            {showExplanation && (
              <motion.div
                style={{ padding: '12px 20px 20px' }}
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: 20 }}
              >
                <div style={{
                  borderRadius: '16px', padding: '12px', marginBottom: '12px', textAlign: 'center',
                  background: answerState === 'correct'
                    ? 'linear-gradient(135deg, #4CAF50, #8BC34A)'
                    : 'linear-gradient(135deg, #F44336, #FF5722)',
                }}>
                  <p style={{ color: '#fff', fontWeight: 900, fontSize: '18px', margin: 0 }}>
                    {answerState === 'correct' ? '🎉 せいかい！' : '😢 ざんねん…'}
                  </p>
                </div>

                <div style={{
                  borderRadius: '16px', padding: '12px', marginBottom: '12px',
                  fontSize: '13px', color: '#374151', lineHeight: 1.6, fontWeight: 500,
                  background: '#f8f9fa', border: '2px solid #e9ecef',
                }}>
                  {q.explanation}
                </div>

                <motion.button
                  onClick={handleNext}
                  style={{
                    width: '100%', padding: '16px', borderRadius: '24px', border: 'none', cursor: 'pointer',
                    background: `linear-gradient(135deg, ${c1}, ${c2})`,
                    color: '#fff', fontSize: '18px', fontWeight: 900, fontFamily: 'inherit',
                    boxShadow: `0 4px 16px ${c1}66`,
                  }}
                  whileHover={{ scale: 1.03 }}
                  whileTap={{ scale: 0.97 }}
                >
                  {idx + 1 >= questions.length ? '🏁 けっかをみる！' : '→ つぎのもんだい'}
                </motion.button>
              </motion.div>
            )}
          </AnimatePresence>
        </motion.div>
      );
    }

    // ─── 結果画面 ──────────────────────────────────────────────
    function ResultScreen({ score, total, onRetry, onHome }) {
      const pct = Math.round((score / total) * 100);
      const rank =
        pct === 100 ? { label: 'のりかえマスター！', emoji: '👑', color: '#F5A623' } :
        pct >= 80   ? { label: 'のりかえはかせ！',   emoji: '🎓', color: '#9C27B0' } :
        pct >= 60   ? { label: 'のりかえじょうず！', emoji: '⭐', color: '#2196F3' } :
        pct >= 40   ? { label: 'もう少し！',         emoji: '💪', color: '#4CAF50' } :
                      { label: 'れんしゅうしよう！', emoji: '📚', color: '#FF9800' };

      const allColors = Object.values(LINE_COLORS);
      const conicDeg = pct * 3.6;

      return (
        <motion.div
          style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', padding: '24px', textAlign: 'center' }}
          initial={{ opacity: 0, scale: 0.8 }}
          animate={{ opacity: 1, scale: 1 }}
          transition={{ type: 'spring', stiffness: 200, damping: 20 }}
        >
          <div style={{ display: 'flex', gap: '6px', marginBottom: '20px', flexWrap: 'wrap', justifyContent: 'center' }}>
            {allColors.map((c, i) => (
              <motion.div
                key={i}
                style={{ width: '20px', height: '20px', borderRadius: '50%', backgroundColor: c }}
                initial={{ scale: 0 }}
                animate={{ scale: 1 }}
                transition={{ delay: i * 0.08, type: 'spring' }}
              />
            ))}
          </div>

          <motion.div
            style={{ fontSize: '72px', marginBottom: '16px' }}
            animate={{ rotate: [0, -10, 10, -10, 0] }}
            transition={{ duration: 0.6, delay: 0.5 }}
          >
            {rank.emoji}
          </motion.div>

          <h2 style={{ fontSize: '24px', fontWeight: 900, color: rank.color, margin: '0 0 4px' }}>
            {rank.label}
          </h2>

          {/* スコア円グラフ */}
          <div style={{
            width: '144px', height: '144px', borderRadius: '50%', margin: '20px auto',
            background: `conic-gradient(${rank.color} ${conicDeg}deg, #e5e7eb ${conicDeg}deg)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 4px 16px rgba(0,0,0,0.12)',
          }}>
            <div style={{
              width: '112px', height: '112px', borderRadius: '50%', background: '#fff',
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            }}>
              <span style={{ fontSize: '40px', fontWeight: 900, color: rank.color }}>{score}</span>
              <span style={{ fontSize: '14px', color: '#6b7280', fontWeight: 700 }}>/ {total}もん</span>
            </div>
          </div>

          <p style={{ color: '#6b7280', fontWeight: 700, marginBottom: '32px' }}>
            せいかいりつ <span style={{ fontSize: '24px', fontWeight: 900, color: rank.color }}>{pct}%</span>
          </p>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', width: '100%', maxWidth: '280px' }}>
            <motion.button
              onClick={onRetry}
              style={{
                width: '100%', padding: '16px', borderRadius: '24px', border: 'none', cursor: 'pointer',
                background: `linear-gradient(135deg, ${rank.color}, ${rank.color}aa)`,
                color: '#fff', fontSize: '18px', fontWeight: 900, fontFamily: 'inherit',
                boxShadow: `0 4px 12px ${rank.color}44`,
              }}
              whileHover={{ scale: 1.04 }}
              whileTap={{ scale: 0.96 }}
            >
              🔄 もういちど！
            </motion.button>
            <motion.button
              onClick={onHome}
              style={{
                width: '100%', padding: '16px', borderRadius: '24px', cursor: 'pointer',
                background: '#f3f4f6', color: '#374151', fontSize: '18px', fontWeight: 900,
                fontFamily: 'inherit', border: '2px solid #e5e7eb',
              }}
              whileHover={{ scale: 1.04 }}
              whileTap={{ scale: 0.96 }}
            >
              🏠 トップへ
            </motion.button>
          </div>
        </motion.div>
      );
    }

    // ─── メインコンポーネント ──────────────────────────────────
    function Quiz() {
      const [gameState, setGameState] = useState('title');
      const [questions, setQuestions] = useState([]);
      const [finalScore, setFinalScore] = useState(0);
      const [finalTotal, setFinalTotal] = useState(0);
      const [selectedMode, setSelectedMode] = useState('all');
      const [isWide, setIsWide] = useState(window.innerWidth > 430);

      useEffect(() => {
        const handler = () => setIsWide(window.innerWidth > 430);
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      const handleSelectMode = (mode) => {
        setSelectedMode(mode);
        const filtered = mode === 'all'
          ? QUIZ_QUESTIONS
          : QUIZ_QUESTIONS.filter(q => q.difficulty === mode);
        setQuestions(shuffle(filtered));
        setGameState('playing');
      };

      const handleFinish = (score, total) => {
        setFinalScore(score);
        setFinalTotal(total);
        setGameState('result');
      };

      const handleRetry = () => {
        const filtered = selectedMode === 'all'
          ? QUIZ_QUESTIONS
          : QUIZ_QUESTIONS.filter(q => q.difficulty === selectedMode);
        setQuestions(shuffle(filtered));
        setGameState('playing');
      };

      const lineColorValues = Object.values(LINE_COLORS);

      return (
        <div style={{
          minHeight: '100svh',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          background: 'linear-gradient(160deg, #e8f0ff 0%, #ffe8e8 50%, #e8fff0 100%)',
          width: '100%',
        }}>
          <div style={{
            position: 'relative', width: '100%', overflow: 'hidden', background: '#fff',
            boxShadow: '0 20px 60px rgba(0,0,0,0.15)',
            maxWidth: '390px',
            minHeight: '100svh',
            maxHeight: '100svh',
            borderRadius: isWide ? '40px' : '0',
            display: 'flex',
            flexDirection: 'column',
          }}>
            {/* 上部装飾バー */}
            <div style={{ display: 'flex', height: '6px', flexShrink: 0 }}>
              {lineColorValues.map((c, i) => (
                <div key={i} style={{ flex: 1, backgroundColor: c }} />
              ))}
            </div>

            {/* コンテンツ */}
            <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
              <AnimatePresence mode="wait">
                {gameState === 'title' && (
                  <motion.div key="title" style={{ position: 'absolute', inset: 0 }}>
                    <TitleScreen onStart={() => setGameState('select')} />
                  </motion.div>
                )}
                {gameState === 'select' && (
                  <motion.div key="select" style={{ position: 'absolute', inset: 0 }}>
                    <SelectScreen onSelect={handleSelectMode} />
                  </motion.div>
                )}
                {gameState === 'playing' && (
                  <motion.div key="playing" style={{ position: 'absolute', inset: 0, overflowY: 'auto' }}>
                    <PlayScreen questions={questions} onFinish={handleFinish} />
                  </motion.div>
                )}
                {gameState === 'result' && (
                  <motion.div key="result" style={{ position: 'absolute', inset: 0, overflowY: 'auto' }}>
                    <ResultScreen
                      score={finalScore}
                      total={finalTotal}
                      onRetry={handleRetry}
                      onHome={() => setGameState('title')}
                    />
                  </motion.div>
                )}
              </AnimatePresence>
            </div>

            {/* 下部装飾バー */}
            <div style={{ display: 'flex', height: '6px', flexShrink: 0 }}>
              {[...lineColorValues].reverse().map((c, i) => (
                <div key={i} style={{ flex: 1, backgroundColor: c }} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── マウント ──────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Quiz />);
  </script>
</body>
</html>
