<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <style>
      .title { font: bold 24px sans-serif; fill: #2c3e50; }
      .label { font: 14px sans-serif; fill: #34495e; }
      .dimension { font: 12px sans-serif; fill: #7f8c8d; }
      .blue { fill: #3c64c8; }
      .gray { fill: #505050; }
      .red { fill: #c85050; }
      .green { fill: #50c850; }
      .silver { fill: #b4b4b4; }
      .outline { fill: none; stroke: #2c3e50; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#f5f5fa"/>
  
  <!-- Title -->
  <rect x="50" y="30" width="450" height="50" fill="#2c3e50" rx="5"/>
  <text x="275" y="62" text-anchor="middle" class="title">Micro:bit Smart Lock - Servo Holder Assembly</text>
  
  <!-- ISOMETRIC VIEW -->
  <text x="275" y="120" text-anchor="middle" class="label" font-weight="bold">ISOMETRIC VIEW (Assembled)</text>
  
  <g transform="translate(275, 250)">
    <!-- Servo Mount (blue cylinder) -->
    <ellipse cx="0" cy="0" rx="55" ry="25" class="blue"/>
    <rect x="-55" y="0" width="110" height="20" class="blue"/>
    <ellipse cx="0" cy="20" rx="55" ry="25" class="blue"/>
    
    <!-- Center Post -->
    <ellipse cx="0" cy="-5" rx="20" ry="10" class="blue"/>
    <rect x="-20" y="-5" width="40" height="15" class="blue"/>
    
    <!-- Connection Arm (gray) -->
    <rect x="0" y="-10" width="125" height="30" class="gray"/>
    
    <!-- Magnet Housing Servo (red) -->
    <ellipse cx="125" cy="10" rx="50" ry="22" class="red"/>
    <rect x="75" y="10" width="100" height="20" class="red"/>
    <ellipse cx="125" cy="30" rx="50" ry="22" class="red"/>
    
    <!-- Magnet 1 (silver) -->
    <ellipse cx="125" cy="35" rx="15" ry="8" class="silver"/>
    <rect x="110" y="35" width="30" height="15" class="silver"/>
    <ellipse cx="125" cy="50" rx="15" ry="8" class="silver"/>
    
    <!-- Magnet 2 (silver) -->
    <ellipse cx="200" cy="35" rx="15" ry="8" class="silver"/>
    <rect x="185" y="35" width="30" height="15" class="silver"/>
    <ellipse cx="200" cy="50" rx="15" ry="8" class="silver"/>
    
    <!-- Magnet Housing Thumb (green) -->
    <ellipse cx="200" cy="10" rx="50" ry="22" class="green"/>
    <rect x="150" y="10" width="100" height="20" class="green"/>
    <ellipse cx="200" cy="30" rx="50" ry="22" class="green"/>
    
    <!-- Thumb Grip (green box) -->
    <rect x="225" y="0" width="40" height="30" class="green"/>
  </g>
  
  <!-- EXPLODED VIEW -->
  <text x="725" y="120" text-anchor="middle" class="label" font-weight="bold">EXPLODED VIEW</text>
  
  <g transform="translate(725, 250)">
    <!-- Servo Mount -->
    <ellipse cx="-150" cy="0" rx="55" ry="25" class="blue"/>
    <rect x="-205" y="0" width="110" height="20" class="blue"/>
    <ellipse cx="-150" cy="20" rx="55" ry="25" class="blue"/>
    <text x="-150" y="50" text-anchor="middle" class="dimension">Servo Mount</text>
    
    <!-- Center Post -->
    <ellipse cx="-150" cy="-30" rx="20" ry="10" class="blue"/>
    <text x="-150" y="-45" text-anchor="middle" class="dimension">Center Post</text>
    
    <!-- Connection Arm -->
    <rect x="-100" y="-10" width="125" height="30" class="gray"/>
    <text x="-37" y="50" text-anchor="middle" class="dimension">Arm</text>
    
    <!-- Magnet Housing S -->
    <ellipse cx="125" cy="10" rx="50" ry="22" class="red"/>
    <rect x="75" y="10" width="100" height="20" class="red"/>
    <ellipse cx="125" cy="30" rx="50" ry="22" class="red"/>
    <text x="125" y="60" text-anchor="middle" class="dimension">Magnet Housing (S)</text>
    
    <!-- Magnet 1 -->
    <ellipse cx="125" cy="-30" rx="15" ry="8" class="silver"/>
    <rect x="110" y="-30" width="30" height="15" class="silver"/>
    <ellipse cx="125" cy="-15" rx="15" ry="8" class="silver"/>
    <text x="125" y="-50" text-anchor="middle" class="dimension">Magnet</text>
    
    <!-- Magnet 2 -->
    <ellipse cx="200" cy="-30" rx="15" ry="8" class="silver"/>
    <rect x="185" y="-30" width="30" height="15" class="silver"/>
    <ellipse cx="200" cy="-15" rx="15" ry="8" class="silver"/>
    <text x="200" y="-50" text-anchor="middle" class="dimension">Magnet</text>
    
    <!-- Magnet Housing T -->
    <ellipse cx="200" cy="10" rx="50" ry="22" class="green"/>
    <rect x="150" y="10" width="100" height="20" class="green"/>
    <ellipse cx="200" cy="30" rx="50" ry="22" class="green"/>
    <text x="200" y="60" text-anchor="middle" class="dimension">Magnet Housing (T)</text>
    
    <!-- Thumb Grip -->
    <rect x="250" y="0" width="40" height="30" class="green"/>
    <text x="270" y="50" text-anchor="middle" class="dimension">Grip</text>
    
    <!-- Explosion arrows -->
    <line x1="-90" y1="0" x2="-50" y2="0" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="200" y1="0" x2="240" y2="0" stroke="#7f8c8d" stroke-width="2"/>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- PARTS LIST -->
  <g transform="translate(50, 480)">
    <rect x="0" y="0" width="400" height="200" fill="#ecf0f1" stroke="#bdc3c7" rx="5"/>
    <rect x="0" y="0" width="400" height="35" fill="#3498db" rx="5"/>
    <text x="200" y="23" text-anchor="middle" class="label" font-weight="bold" fill="white">PARTS LIST</text>
    
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="20" height="20" class="blue"/>
      <text x="30" y="15" class="label">1. Servo Mount (22mm diameter)</text>
      
      <rect x="0" y="30" width="20" height="20" class="blue"/>
      <text x="30" y="45" class="label">2. Center Post (8mm diameter)</text>
      
      <rect x="0" y="60" width="20" height="20" class="gray"/>
      <text x="30" y="75" class="label">3. Connection Arm (25mm length)</text>
      
      <rect x="0" y="90" width="20" height="20" class="red"/>
      <text x="30" y="105" class="label">4. Magnet Housing - Servo Side</text>
      
      <rect x="200" y="0" width="20" height="20" class="silver"/>
      <text x="230" y="15" class="label">5. Neodymium Magnet (6×3mm) ×2</text>
      
      <rect x="200" y="30" width="20" height="20" class="green"/>
      <text x="230" y="45" class="label">6. Magnet Housing - Thumb Side</text>
      
      <rect x="200" y="60" width="20" height="20" class="green"/>
      <text x="230" y="75" class="label">7. Thumb Grip</text>
    </g>
  </g>
  
  <!-- SPECIFICATIONS -->
  <g transform="translate(500, 480)">
    <rect x="0" y="0" width="450" height="200" fill="#ecf0f1" stroke="#bdc3c7" rx="5"/>
    <rect x="0" y="0" width="450" height="35" fill="#27ae60" rx="5"/>
    <text x="225" y="23" text-anchor="middle" class="label" font-weight="bold" fill="white">SPECIFICATIONS</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" class="label">• Material: PLA or PETG (3D print)</text>
      <text x="0" y="25" class="label">• Layer Height: 0.2mm</text>
      <text x="0" y="50" class="label">• Infill: 100% (for strength)</text>
      <text x="0" y="75" class="label">• Magnet: Neodymium N52, 6mm dia × 3mm</text>
      <text x="0" y="100" class="label">• Servo: MG90S (metal gear recommended)</text>
      <text x="0" y="125" class="label">• Mounting: Command strips (no drilling)</text>
      <text x="0" y="150" class="label">• Coupling: Magnetic (allows manual override)</text>
    </g>
  </g>
  
  <!-- FOOTER -->
  <rect x="0" y="670" width="1000" height="30" fill="#34495e"/>
  <text x="500" y="690" text-anchor="middle" class="dimension" fill="white">Micro:bit Smart Lock Project | servo-holder-diagram.svg</text>
</svg>
